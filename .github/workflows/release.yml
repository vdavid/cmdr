name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.arch }})
        runs-on: macos-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      arch: aarch64
                    - target: x86_64-apple-darwin
                      arch: x86_64
                    - target: universal-apple-darwin
                      arch: universal

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Install mise
              uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

            - name: Install tools with mise
              run: mise install

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile
              working-directory: ./apps/desktop

            - name: Generate SvelteKit types
              run: pnpm exec svelte-kit sync
              working-directory: ./apps/desktop

            - name: Install x86_64 Rust target
              if: matrix.arch != 'aarch64'
              run: rustup target add x86_64-apple-darwin

            - name: Import Apple certificate
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
              run: |
                  CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
                  KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

                  echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
                    -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security set-key-partition-list -S apple-tool:,apple: \
                    -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH

            - name: Set up notarization credentials
              env:
                  APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
              run: |
                  mkdir -p ~/private_keys
                  echo -n "$APPLE_API_KEY_BASE64" | base64 --decode \
                    > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8

            - name: Build, sign, and notarize
              id: build_attempt_1
              continue-on-error: true
              uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
                  APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
              with:
                  projectPath: ./apps/desktop
                  args: --target ${{ matrix.target }}
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Cmdr ${{ github.ref_name }}'
                  releaseBody: 'See CHANGELOG.md for details.'
                  releaseDraft: false

            - name: Build, sign, and notarize (retry)
              id: build_attempt_2
              if: steps.build_attempt_1.outcome == 'failure'
              uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
                  APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
              with:
                  projectPath: ./apps/desktop
                  args: --target ${{ matrix.target }}
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Cmdr ${{ github.ref_name }}'
                  releaseBody: 'See CHANGELOG.md for details.'
                  releaseDraft: false

            - name: Verify build succeeded
              if: steps.build_attempt_1.outcome == 'failure' && steps.build_attempt_2.outcome == 'failure'
              run: |
                  echo "Both build attempts failed"
                  exit 1

            - name: Rename and upload updater artifacts
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ github.ref_name }}"
                  BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"

                  # tauri-action uploads DMG automatically. We just need to rename
                  # updater artifacts to include arch (Tauri names them all Cmdr.app.tar.gz)
                  UPDATER=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" | head -1)
                  SIG_FILE="${UPDATER}.sig"

                  if [ -z "$UPDATER" ] || [ ! -f "$SIG_FILE" ]; then
                      echo "Updater artifacts not found, tauri-action may have uploaded them already"
                      exit 0
                  fi

                  UPDATER_RENAMED="/tmp/Cmdr_${{ matrix.arch }}.app.tar.gz"
                  SIG_RENAMED="/tmp/Cmdr_${{ matrix.arch }}.app.tar.gz.sig"
                  cp "$UPDATER" "$UPDATER_RENAMED"
                  cp "$SIG_FILE" "$SIG_RENAMED"

                  gh release upload "$TAG" "$UPDATER_RENAMED" "$SIG_RENAMED" --clobber

            - name: Save signature as artifact
              run: |
                  BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
                  SIG_FILE=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" | head -1)
                  mkdir -p /tmp/sig-artifacts

                  if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
                      cp "$SIG_FILE" "/tmp/sig-artifacts/signature-${{ matrix.arch }}.txt"
                  else
                      echo "Signature file not found in bundle dir, checking tauri-action output"
                      # Fall back: download from release
                      TAG="${{ github.ref_name }}"
                      # tauri-action uploads as Cmdr.app.tar.gz.sig
                      gh release download "$TAG" -p "Cmdr.app.tar.gz.sig" -D /tmp/sig-artifacts --clobber || true
                      if [ -f "/tmp/sig-artifacts/Cmdr.app.tar.gz.sig" ]; then
                          mv "/tmp/sig-artifacts/Cmdr.app.tar.gz.sig" "/tmp/sig-artifacts/signature-${{ matrix.arch }}.txt"
                      fi
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload signature artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: signature-${{ matrix.arch }}
                  path: /tmp/sig-artifacts/signature-${{ matrix.arch }}.txt

            - name: Clean up keychain
              if: always()
              run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

    publish:
        name: Publish release
        needs: [build]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Download all signature artifacts
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  path: /tmp/signatures
                  pattern: signature-*

            - name: Extract changelog for this version
              id: changelog
              run: |
                  VERSION="${{ github.ref_name }}"
                  VERSION="${VERSION#v}"

                  # Extract section for this version from CHANGELOG.md
                  NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d')

                  # Write to file to preserve newlines
                  echo "$NOTES" > /tmp/notes.txt

            - name: Generate latest.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ github.ref_name }}"
                  VERSION="${VERSION#v}"
                  TAG="${{ github.ref_name }}"

                  # Read signatures from downloaded artifacts
                  SIG_AARCH64=$(cat /tmp/signatures/signature-aarch64/signature-aarch64.txt)
                  SIG_X86_64=$(cat /tmp/signatures/signature-x86_64/signature-x86_64.txt)
                  SIG_UNIVERSAL=$(cat /tmp/signatures/signature-universal/signature-universal.txt)

                  # Query DMG sizes from the release assets
                  SIZE_AARCH64=$(gh api "repos/vdavid/cmdr/releases/tags/$TAG" --jq ".assets[] | select(.name | endswith(\"_aarch64.dmg\")) | .size" || echo 0)
                  SIZE_X86_64=$(gh api "repos/vdavid/cmdr/releases/tags/$TAG" --jq ".assets[] | select(.name | endswith(\"_x86_64.dmg\")) | .size" || echo 0)
                  SIZE_UNIVERSAL=$(gh api "repos/vdavid/cmdr/releases/tags/$TAG" --jq ".assets[] | select(.name | endswith(\"_universal.dmg\")) | .size" || echo 0)

                  # Read notes from file, escape for JSON
                  NOTES=$(cat /tmp/notes.txt | jq -Rs .)

                  BASE_URL="https://github.com/vdavid/cmdr/releases/download/$TAG"

                  cat > /tmp/latest.json << EOF
                  {
                      "version": "$VERSION",
                      "dmgSizes": {
                          "aarch64": ${SIZE_AARCH64:-0},
                          "x86_64": ${SIZE_X86_64:-0},
                          "universal": ${SIZE_UNIVERSAL:-0}
                      },
                      "notes": $NOTES,
                      "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                      "platforms": {
                          "darwin-universal": {
                              "signature": "$SIG_UNIVERSAL",
                              "url": "$BASE_URL/Cmdr_universal.app.tar.gz"
                          },
                          "darwin-aarch64": {
                              "signature": "$SIG_AARCH64",
                              "url": "$BASE_URL/Cmdr_aarch64.app.tar.gz"
                          },
                          "darwin-x86_64": {
                              "signature": "$SIG_X86_64",
                              "url": "$BASE_URL/Cmdr_x86_64.app.tar.gz"
                          }
                      }
                  }
                  EOF

            - name: Update release body with changelog
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ github.ref_name }}"
                  gh release edit "$TAG" --notes-file /tmp/notes.txt

            - name: Commit latest.json to main
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Fetch and checkout main branch
                  git fetch origin main
                  git checkout main

                  # Copy the generated file and commit
                  cp /tmp/latest.json apps/website/public/latest.json
                  git add apps/website/public/latest.json
                  git commit -m "chore(release): update latest.json for ${{ github.ref_name }} [skip ci]"
                  git push origin main

            - name: Trigger website deploy
              run: |
                  # Compute HMAC-SHA256 signature
                  PAYLOAD='{}'
                  SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | cut -d' ' -f2)

                  # Send signed request to webhook
                  curl -f -X POST https://getcmdr.com/hooks/deploy-website \
                      -H "Content-Type: application/json" \
                      -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
                      -d "$PAYLOAD"
