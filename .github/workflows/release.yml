name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: universal-apple-darwin
            arch: universal

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./apps/desktop

      - name: Generate SvelteKit types
        run: pnpm exec svelte-kit sync
        working-directory: ./apps/desktop

      - name: Set up llama-server signing keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # tauri-action's bundler does the APP-BUNDLE signing-keychain setup itself from the
          # APPLE_CERTIFICATE env vars, but only at BUNDLING time. The llama-server dylib signing
          # in beforeBuildCommand (download-llama-server.go) runs BEFORE that, and the runner's
          # launchd service (SessionCreate=true) lives in its own security session where the login
          # keychain's private key isn't usable: codesign fails with errSecInternalComponent
          # (works fine from a GUI shell). Give that signing its own hermetic keychain.
          #
          # The keychain MUST be both targeted explicitly (codesign --keychain via
          # $LLAMA_SIGN_KEYCHAIN in download-llama-server.go) AND in the user keychain search
          # list: --keychain alone fails with errSecInternalComponent for a keychain outside the
          # search list (verified empirically on this runner). The explicit --keychain pins
          # identity resolution to this keychain, so the login keychain's copy of the same
          # identity can't make resolution ambiguous (the failure mode an earlier manual-import
          # step had). The "Restore keychain search list" cleanup step below resets the search
          # list to login-only on every run, pass or fail.
          KEYCHAIN_PATH="$RUNNER_TEMP/llama-sign.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/llama-sign-cert.p12"
          security import "$RUNNER_TEMP/llama-sign-cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/llama-sign-cert.p12"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            "$HOME/Library/Keychains/login.keychain-db"
          echo "LLAMA_SIGN_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set up notarization credentials
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8

      - name: Detach stale Cmdr* DMG mounts
        # tauri-action's bundle_dmg.sh fails fast (~3 s) when the "Cmdr" volume name is already
        # taken in /Volumes (typically from a previous Finder double-click on an old DMG;
        # the self-hosted runner shares /Volumes with the dev's interactive session). Detach any
        # leftovers so the new bundle gets the canonical volume name. scripts/release.sh has the
        # same guard pre-tag-push, but this catches mounts that appear AFTER the tag push.
        run: |
          while IFS= read -r vol; do
            if [[ -n "$vol" ]]; then
              echo "Detaching stale mount: $vol"
              hdiutil detach "$vol" -force >/dev/null 2>&1 || true
            fi
          done < <(mount | awk -F' on ' '/\/Volumes\/Cmdr/ { sub(/ \(.*$/, "", $2); print $2 }')

      - name: Build, sign, and notarize
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          projectPath: ./apps/desktop
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Cmdr ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: false

      - name: Delete llama-server signing keychain
        if: always()
        run: |
          if [ -n "${LLAMA_SIGN_KEYCHAIN:-}" ] && [ -f "$LLAMA_SIGN_KEYCHAIN" ]; then
            security delete-keychain "$LLAMA_SIGN_KEYCHAIN"
          fi

      - name: Restore keychain search list
        if: always()
        run: |
          # tauri-action's bundler creates a temporary signing keychain, appends it to the user
          # keychain search list, and on teardown deletes the keychain file but never restores the
          # search list. On this persistent self-hosted runner that leaves a stale (deleted) entry
          # in the list across releases, which can re-introduce identity ambiguity. Reset the user
          # search list to the canonical login keychain so `gh` (its OAuth token lives there via
          # secure storage) and other keychain-backed tools keep working after a release.
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db"

  publish:
    name: Publish release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download signatures from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p /tmp/signatures
          gh release download "$TAG" -p "Cmdr_*.app.tar.gz.sig" -D /tmp/signatures

          # Verify all 3 arch sigs were downloaded
          for arch in aarch64 x64 universal; do
              [ -f "/tmp/signatures/Cmdr_${arch}.app.tar.gz.sig" ] || { echo "Missing sig for $arch"; exit 1; }
          done

      - name: Extract changelog for this version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Extract section for this version from CHANGELOG.md
          NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d' | sed '/./,$!d')

          printf '%s\n' "$NOTES" > /tmp/notes.txt

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TAG="${{ github.ref_name }}"

          # Read signatures downloaded from the release
          SIG_AARCH64=$(cat /tmp/signatures/Cmdr_aarch64.app.tar.gz.sig)
          SIG_X86_64=$(cat /tmp/signatures/Cmdr_x64.app.tar.gz.sig)
          SIG_UNIVERSAL=$(cat /tmp/signatures/Cmdr_universal.app.tar.gz.sig)

          # Query DMG sizes from the release assets (tauri-action uses "x64" in DMG names)
          RELEASE_JSON=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG")
          SIZE_AARCH64=$(echo "$RELEASE_JSON" | jq '[.assets[] | select(.name | endswith("_aarch64.dmg"))][0].size // 0')
          SIZE_X86_64=$(echo "$RELEASE_JSON" | jq '[.assets[] | select(.name | endswith("_x64.dmg"))][0].size // 0')
          SIZE_UNIVERSAL=$(echo "$RELEASE_JSON" | jq '[.assets[] | select(.name | endswith("_universal.dmg"))][0].size // 0')

          # Read notes from file, escape for JSON
          NOTES=$(jq -Rs . < /tmp/notes.txt)

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG"

          jq -n --indent 2 \
            --arg version "$VERSION" \
            --argjson size_aarch64 "$SIZE_AARCH64" \
            --argjson size_x86_64 "$SIZE_X86_64" \
            --argjson size_universal "$SIZE_UNIVERSAL" \
            --argjson notes "$NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig_universal "$SIG_UNIVERSAL" \
            --arg sig_aarch64 "$SIG_AARCH64" \
            --arg sig_x86_64 "$SIG_X86_64" \
            --arg base_url "$BASE_URL" \
            '{
              version: $version,
              dmgSizes: { aarch64: $size_aarch64, x86_64: $size_x86_64, universal: $size_universal },
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-universal": { signature: $sig_universal, url: "\($base_url)/Cmdr_universal.app.tar.gz" },
                "darwin-aarch64": { signature: $sig_aarch64, url: "\($base_url)/Cmdr_aarch64.app.tar.gz" },
                "darwin-x86_64": { signature: $sig_x86_64, url: "\($base_url)/Cmdr_x64.app.tar.gz" }
              }
            }' > /tmp/latest.json

      - name: Replace tauri-action's latest.json on the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" /tmp/latest.json --clobber

      - name: Update release body with changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" --notes-file /tmp/notes.txt

      - name: Commit latest.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch and checkout main branch
          git fetch origin main
          git checkout main

          # Copy the generated file and commit
          cp /tmp/latest.json apps/website/public/latest.json
          git add apps/website/public/latest.json
          git commit -m "chore(release): update latest.json for ${{ github.ref_name }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Trigger website deploy
        run: |
          # Compute HMAC-SHA256 signature
          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | cut -d' ' -f2)

          # Send signed request to webhook
          curl -f -X POST https://getcmdr.com/hooks/deploy-website \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
              -d "$PAYLOAD"
