name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.arch }})
        runs-on: macos-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      arch: aarch64
                    - target: x86_64-apple-darwin
                      arch: x86_64
                    - target: universal-apple-darwin
                      arch: universal

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Install mise
              uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

            - name: Install tools with mise
              run: mise install

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile
              working-directory: ./apps/desktop

            - name: Generate SvelteKit types
              run: pnpm exec svelte-kit sync
              working-directory: ./apps/desktop

            - name: Install x86_64 Rust target
              if: matrix.arch != 'aarch64'
              run: rustup target add x86_64-apple-darwin

            - name: Import Apple certificate
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
              run: |
                  CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
                  KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

                  echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
                    -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security set-key-partition-list -S apple-tool:,apple: \
                    -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH

            - name: Set up notarization credentials
              env:
                  APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
              run: |
                  mkdir -p ~/private_keys
                  echo -n "$APPLE_API_KEY_BASE64" | base64 --decode \
                    > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8

            - name: Build, sign, and notarize
              id: build_attempt_1
              continue-on-error: true
              uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
                  APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
              with:
                  projectPath: ./apps/desktop
                  args: --target ${{ matrix.target }}
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Cmdr ${{ github.ref_name }}'
                  releaseBody: 'See CHANGELOG.md for details.'
                  releaseDraft: false

            - name: Build, sign, and notarize (retry)
              id: build_attempt_2
              if: steps.build_attempt_1.outcome == 'failure'
              uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
                  APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
              with:
                  projectPath: ./apps/desktop
                  args: --target ${{ matrix.target }}
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Cmdr ${{ github.ref_name }}'
                  releaseBody: 'See CHANGELOG.md for details.'
                  releaseDraft: false

            - name: Verify build succeeded
              if: steps.build_attempt_1.outcome == 'failure' && steps.build_attempt_2.outcome == 'failure'
              run: |
                  echo "Both build attempts failed"
                  exit 1

            - name: Clean up keychain
              if: always()
              run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

    publish:
        name: Publish release
        needs: [build]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Download signatures from release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ github.ref_name }}"
                  mkdir -p /tmp/signatures
                  gh release download "$TAG" -p "Cmdr_*.app.tar.zst.sig" -D /tmp/signatures

                  # Verify all 3 arch sigs were downloaded
                  for arch in aarch64 x64 universal; do
                      [ -f "/tmp/signatures/Cmdr_${arch}.app.tar.zst.sig" ] || { echo "Missing sig for $arch"; exit 1; }
                  done

            - name: Extract changelog for this version
              run: |
                  VERSION="${{ github.ref_name }}"
                  VERSION="${VERSION#v}"

                  # Extract section for this version from CHANGELOG.md
                  NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d' | sed '/./,$!d')

                  printf '%s\n' "$NOTES" > /tmp/notes.txt

            - name: Generate latest.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ github.ref_name }}"
                  VERSION="${VERSION#v}"
                  TAG="${{ github.ref_name }}"

                  # Read signatures downloaded from the release
                  SIG_AARCH64=$(cat /tmp/signatures/Cmdr_aarch64.app.tar.zst.sig)
                  SIG_X86_64=$(cat /tmp/signatures/Cmdr_x64.app.tar.zst.sig)
                  SIG_UNIVERSAL=$(cat /tmp/signatures/Cmdr_universal.app.tar.zst.sig)

                  # Query DMG sizes from the release assets (tauri-action uses "x64" in DMG names)
                  RELEASE_JSON=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG")
                  SIZE_AARCH64=$(echo "$RELEASE_JSON" | jq '[.assets[] | select(.name | endswith("_aarch64.dmg"))][0].size // 0')
                  SIZE_X86_64=$(echo "$RELEASE_JSON" | jq '[.assets[] | select(.name | endswith("_x64.dmg"))][0].size // 0')
                  SIZE_UNIVERSAL=$(echo "$RELEASE_JSON" | jq '[.assets[] | select(.name | endswith("_universal.dmg"))][0].size // 0')

                  # Read notes from file, escape for JSON
                  NOTES=$(jq -Rs . < /tmp/notes.txt)

                  BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG"

                  jq -n --indent 4 \
                    --arg version "$VERSION" \
                    --argjson size_aarch64 "$SIZE_AARCH64" \
                    --argjson size_x86_64 "$SIZE_X86_64" \
                    --argjson size_universal "$SIZE_UNIVERSAL" \
                    --argjson notes "$NOTES" \
                    --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --arg sig_universal "$SIG_UNIVERSAL" \
                    --arg sig_aarch64 "$SIG_AARCH64" \
                    --arg sig_x86_64 "$SIG_X86_64" \
                    --arg base_url "$BASE_URL" \
                    '{
                      version: $version,
                      dmgSizes: { aarch64: $size_aarch64, x86_64: $size_x86_64, universal: $size_universal },
                      notes: $notes,
                      pub_date: $pub_date,
                      platforms: {
                        "darwin-universal": { signature: $sig_universal, url: "\($base_url)/Cmdr_universal.app.tar.zst" },
                        "darwin-aarch64": { signature: $sig_aarch64, url: "\($base_url)/Cmdr_aarch64.app.tar.zst" },
                        "darwin-x86_64": { signature: $sig_x86_64, url: "\($base_url)/Cmdr_x64.app.tar.zst" }
                      }
                    }' > /tmp/latest.json

            - name: Replace tauri-action's latest.json on the release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ github.ref_name }}"
                  gh release delete-asset "$TAG" latest.json --yes || true
                  gh release upload "$TAG" /tmp/latest.json

            - name: Update release body with changelog
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ github.ref_name }}"
                  gh release edit "$TAG" --notes-file /tmp/notes.txt

            - name: Commit latest.json to main
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Fetch and checkout main branch
                  git fetch origin main
                  git checkout main

                  # Copy the generated file and commit
                  cp /tmp/latest.json apps/website/public/latest.json
                  git add apps/website/public/latest.json
                  git commit -m "chore(release): update latest.json for ${{ github.ref_name }} [skip ci]"
                  git pull --rebase origin main
                  git push origin main

            - name: Trigger website deploy
              run: |
                  # Compute HMAC-SHA256 signature
                  PAYLOAD='{}'
                  SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | cut -d' ' -f2)

                  # Send signed request to webhook
                  curl -f -X POST https://getcmdr.com/hooks/deploy-website \
                      -H "Content-Type: application/json" \
                      -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
                      -d "$PAYLOAD"
