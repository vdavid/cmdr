name: Deploy analytics dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'apps/analytics-dashboard/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy analytics dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Install tools with mise
        run: mise install

      - name: Cache pnpm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-dashboard-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-dashboard-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        working-directory: ./apps/analytics-dashboard

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy .svelte-kit/cloudflare --project-name=cmdr-analytics-dashboard
        working-directory: ./apps/analytics-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
