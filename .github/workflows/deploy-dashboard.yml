name: Deploy analytics dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'apps/analytics-dashboard/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy analytics dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache pnpm
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-dashboard-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-dashboard-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        working-directory: ./apps/analytics-dashboard

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy .svelte-kit/cloudflare --project-name=cmdr-analytics-dashboard
        working-directory: ./apps/analytics-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
