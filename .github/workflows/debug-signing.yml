# Temporary debug workflow to diagnose codesign errSecInternalComponent on the self-hosted
# runner (SessionCreate=true gives it its own security session). Delete after the v0.24.0
# release ships.
name: Debug signing

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Debug codesign
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    steps:
      - name: T0 session + keychain context
        run: |
          echo "managername: $(launchctl managername || true)"
          echo "user search list:"
          security list-keychains -d user || true
          echo "default keychain:"
          security default-keychain || true
          echo "identity count: $(security find-identity -v -p codesigning | tail -1 || true)"

      - name: T1 codesign via login keychain (search list)
        if: always()
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          cp /bin/ls "$RUNNER_TEMP/t1-bin"
          if codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$RUNNER_TEMP/t1-bin"; then
            echo "T1 RESULT: PASS"
          else
            echo "T1 RESULT: FAIL ($?)"
          fi

      - name: T2 fresh keychain, NOT in search list, codesign --keychain
        if: always()
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          KC="$RUNNER_TEMP/debug-sign.keychain-db"
          PW=$(openssl rand -base64 24)
          security create-keychain -p "$PW" "$KC"
          security set-keychain-settings "$KC"
          security unlock-keychain -p "$PW" "$KC"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/debug-cert.p12"
          security import "$RUNNER_TEMP/debug-cert.p12" -k "$KC" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/debug-cert.p12"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$PW" "$KC" > /dev/null
          echo "KC=$KC" >> "$GITHUB_ENV"
          cp /bin/ls "$RUNNER_TEMP/t2-bin"
          if codesign --force --options runtime --timestamp --keychain "$KC" --sign "$APPLE_SIGNING_IDENTITY" "$RUNNER_TEMP/t2-bin"; then
            echo "T2 RESULT: PASS"
          else
            echo "T2 RESULT: FAIL ($?)"
          fi

      - name: T3 same keychain, ADDED to search list, codesign --keychain
        if: always()
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          security list-keychains -d user -s "$KC" "$HOME/Library/Keychains/login.keychain-db"
          security list-keychains -d user
          cp /bin/ls "$RUNNER_TEMP/t3-bin"
          if codesign --force --options runtime --timestamp --keychain "$KC" --sign "$APPLE_SIGNING_IDENTITY" "$RUNNER_TEMP/t3-bin"; then
            echo "T3 RESULT: PASS"
          else
            echo "T3 RESULT: FAIL ($?)"
          fi

      - name: T4 env propagation into child processes
        if: always()
        run: |
          echo "KC from GITHUB_ENV: ${KC:-<NOT SET>}"
          bash -c 'echo "KC in child shell: ${KC:-<NOT SET>}"'

      - name: Cleanup
        if: always()
        run: |
          [ -n "${KC:-}" ] && [ -f "$KC" ] && security delete-keychain "$KC" || true
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db"
          security list-keychains -d user
