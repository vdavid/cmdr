name: Slow checks

# Security, dependency, and thorough lint checks: things too slow or too
# cadence-driven for per-push CI. Runs every 6 days at 4 AM CET (3 AM UTC).
# (Was nightly; reduced to weekly, then to every-6-days in June 2026. The 6-day
# cadence is deliberate, NOT weekly: it keeps the gap under GitHub's 7-day cache
# eviction so this job's rust-cache (cargo-udeps's nightly target) survives run
# to run. `*/6` on day-of-month fires on the 1st/7th/13th/19th/25th/31st — gaps
# are always ≤6 days, including across month boundaries. Don't switch it back to
# a weekly `* * 1` form: that reintroduces a 7-day gap and the cache goes cold.
# If runs ever stop appearing, check the workflow isn't disabled in GitHub's UI:
# a manual disable survives file changes; `gh workflow enable "Slow checks"`
# re-enables.)
# GitHub automatically emails repo admins on failure
on:
  schedule:
    - cron: '0 3 */6 * *' # every 6 days, 4 AM CET = 3 AM UTC (≤6-day gap < 7-day cache eviction)
  workflow_dispatch: # Allow manual trigger

jobs:
  # ===========================================
  # Rust dependency and security checks
  # ===========================================
  dependency-checks:
    name: Dependency checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Same reason as the desktop-rust job: a warm rust-cache restore plus the
      # nightly udeps build can crowd the runner's ~14 GB free disk. Reclaim the
      # unused preinstalled SDKs up front. Best-effort; `df -h` for diagnosis.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/share/swift /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Install tools with mise
        run: mise install

      # Caches target/ + cargo deps so cargo-udeps's nightly compile is incremental
      # across runs. rust-cache keys per-job, so this is a SEPARATE cache from the
      # per-push desktop-rust one (different job, nightly vs stable). GitHub evicts
      # caches after 7 days unused — the every-6-days schedule (see the cron above)
      # is what keeps THIS cache warm run to run. Caveat: this is a third multi-GB
      # Rust cache (with desktop-rust + the e2e Docker cache); if the repo total
      # crosses GitHub's 10 GB ceiling, LRU may evict the least-used (this one)
      # regardless of the cron. Watch `gh cache list` sizes.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libacl1-dev

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      - name: Run cargo-audit
        run: ./scripts/check/check --check desktop-rust-cargo-audit --ci

      - name: Run cargo-deny
        run: ./scripts/check/check --check desktop-rust-cargo-deny --ci

      # cargo-udeps runs on a pinned, dated nightly so an upstream lint change
      # can't break this scheduled job at a random time. The check tool owns the
      # pin (`checks/desktop-rust-cargo-udeps.go`) and prints it here, so the
      # date lives in exactly one place.
      - name: Install nightly toolchain (for cargo-udeps)
        run: rustup toolchain install "$(./scripts/check/check --print-nightly)" --profile minimal

      - name: Run cargo-udeps
        run: ./scripts/check/check --check desktop-rust-cargo-udeps --ci

      - name: Run govulncheck
        run: ./scripts/check/check --check scripts-go-govulncheck --ci

      # Real-API smoke against Groq (OpenAI-compatible, free tier). Self-skips when the
      # GROQ_API_KEY secret is absent, so this never fails the workflow before the secret
      # is added in repo settings. Catches adapter-routing / auth / parse regressions that
      # the wiremock tests can't (e.g. the genai Ollama-fallback bug for `llama-*` models).
      - name: Run Groq smoke (real API)
        run: ./scripts/check/check --check desktop-rust-groq-smoke --ci
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # ===========================================
  # Type-aware ESLint (too slow for per-push CI)
  # ===========================================
  eslint-typecheck:
    name: ESLint (type-aware)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache pnpm
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SvelteKit types
        run: pnpm exec svelte-kit sync
        working-directory: ./apps/desktop

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      # Two passes since the check was split (10632789): one projectService
      # batch per file type keeps each pass ~15 s instead of ~10 min combined.
      - name: Run type-aware ESLint (Svelte files)
        run: ./scripts/check/check --check desktop-svelte-eslint-typecheck-svelte --ci

      - name: Run type-aware ESLint (TypeScript files)
        run: ./scripts/check/check --check desktop-svelte-eslint-typecheck-typescript --ci

  # ===========================================
  # Website Docker build
  # ===========================================
  # The website deploys as a Docker image built on the server; per-push CI only
  # builds the site itself. This periodic full image build catches Dockerfile /
  # .dockerignore drift before it breaks a real deploy.
  website-docker:
    name: Website Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Install tools with mise
        run: mise install

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      - name: Build website Docker image
        run: ./scripts/check/check --check website-docker-build --ci

  # ===========================================
  # SMB soak test (manual trigger only)
  # ===========================================
  # 30-minute repeated SMB→Local copy loop that watches for accumulating bugs
  # (credit leaks, FD leaks, memory growth, per-iteration drift). Nightly is
  # too aggressive for a soak this long; `workflow_dispatch` runs it on demand
  # when we want the signal (pre-release, after SMB refactors, etc.).
  smb-soak:
    name: SMB soak (30 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 50

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache Cargo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libacl1-dev

      - name: Start Docker SMB containers
        run: ./apps/desktop/test/smb-servers/start.sh core

      - name: Run SMB soak (30 min)
        run: ./scripts/soak-smb.sh 1800
        env:
          RUST_LOG: info

      - name: Stop Docker SMB containers
        if: always()
        run: ./apps/desktop/test/smb-servers/stop.sh || true
