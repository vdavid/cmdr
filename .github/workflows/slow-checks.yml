name: Slow checks

# Weekly security, dependency, and thorough lint checks: things too slow or too
# cadence-driven for per-push CI. Mondays at 4 AM CET (3 AM UTC) so newly
# disclosed vulnerabilities surface at the start of the week.
# (Was nightly; deliberately reduced to weekly in June 2026, the nightly cadence
# was more than we needed. If runs ever stop appearing, check the workflow isn't
# disabled in GitHub's UI: a manual disable survives file changes, `gh workflow
# enable "Slow checks"` re-enables.)
# GitHub automatically emails repo admins on failure
on:
  schedule:
    - cron: '0 3 * * 1' # Mondays, 4 AM CET = 3 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  # ===========================================
  # Rust dependency and security checks
  # ===========================================
  dependency-checks:
    name: Dependency checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache Cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libacl1-dev

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      - name: Run cargo-audit
        run: ./scripts/check/check --check desktop-rust-cargo-audit --ci

      - name: Run cargo-deny
        run: ./scripts/check/check --check desktop-rust-cargo-deny --ci

      - name: Install nightly toolchain (for cargo-udeps)
        run: rustup toolchain install nightly

      - name: Run cargo-udeps
        run: ./scripts/check/check --check desktop-rust-cargo-udeps --ci

      - name: Run govulncheck
        run: ./scripts/check/check --check scripts-go-govulncheck --ci

  # ===========================================
  # Type-aware ESLint (too slow for per-push CI)
  # ===========================================
  eslint-typecheck:
    name: ESLint (type-aware)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache pnpm
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SvelteKit types
        run: pnpm exec svelte-kit sync
        working-directory: ./apps/desktop

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      # Two passes since the check was split (10632789): one projectService
      # batch per file type keeps each pass ~15 s instead of ~10 min combined.
      - name: Run type-aware ESLint (Svelte files)
        run: ./scripts/check/check --check desktop-svelte-eslint-typecheck-svelte --ci

      - name: Run type-aware ESLint (TypeScript files)
        run: ./scripts/check/check --check desktop-svelte-eslint-typecheck-typescript --ci

  # ===========================================
  # Website Docker build
  # ===========================================
  # The website deploys as a Docker image built on the server; per-push CI only
  # builds the site itself. This weekly full image build catches Dockerfile /
  # .dockerignore drift before it breaks a real deploy.
  website-docker:
    name: Website Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      - name: Build website Docker image
        run: ./scripts/check/check --check website-docker-build --ci

  # ===========================================
  # SMB soak test (manual trigger only)
  # ===========================================
  # 30-minute repeated SMB→Local copy loop that watches for accumulating bugs
  # (credit leaks, FD leaks, memory growth, per-iteration drift). Nightly is
  # too aggressive for a soak this long; `workflow_dispatch` runs it on demand
  # when we want the signal (pre-release, after SMB refactors, etc.).
  smb-soak:
    name: SMB soak (30 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 50

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache Cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libacl1-dev

      - name: Start Docker SMB containers
        run: ./apps/desktop/test/smb-servers/start.sh core

      - name: Run SMB soak (30 min)
        run: ./scripts/soak-smb.sh 1800
        env:
          RUST_LOG: info

      - name: Stop Docker SMB containers
        if: always()
        run: ./apps/desktop/test/smb-servers/stop.sh || true
