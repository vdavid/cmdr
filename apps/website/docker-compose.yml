services:
  getcmdr-static:
    build:
      context: ../..
      dockerfile: apps/website/Dockerfile
    container_name: getcmdr-static
    restart: unless-stopped
    networks:
      - proxy-net

  # Caddy route needed: comments.getcmdr.com -> remark42:8080
  remark42:
    # v1.16.x is a security release: stored XSS via the image proxy, an OAuth
    # open-redirect, path traversal in /picture/, and SSRF in the title
    # extractor. Deploy deliberately; the open-redirect fix wires
    # `AllowedRedirectHosts`, so verify Google/GitHub sign-in still completes
    # after the first deploy.
    image: umputun/remark42:v1.16.4
    container_name: remark42
    restart: unless-stopped
    volumes:
      - remark42-data:/srv/var
    environment:
      - REMARK_URL=https://comments.getcmdr.com
      - SECRET=${REMARK42_SECRET}
      - SITE=getcmdr
      - AUTH_GOOGLE_CID=${AUTH_GOOGLE_CID}
      - AUTH_GOOGLE_CSEC=${AUTH_GOOGLE_CSEC}
      - AUTH_GITHUB_CID=${AUTH_GITHUB_CID}
      - AUTH_GITHUB_CSEC=${AUTH_GITHUB_CSEC}
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true

volumes:
  remark42-data:
