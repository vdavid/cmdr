name = "cmdr-license-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# api.getcmdr.com is a proxied CNAME → *.workers.dev (handles IPv4 + IPv6).
# The zone-level route tells Cloudflare to send matching requests to this Worker.
# license.getcmdr.com is kept as a permanent alias — existing app versions hardcode it.
workers_dev = true

[[routes]]
pattern = "api.getcmdr.com/*"
zone_name = "getcmdr.com"

[[routes]]
pattern = "license.getcmdr.com/*"
zone_name = "getcmdr.com"

# KV namespace for storing license code -> full key mappings
# Local dev: wrangler automatically simulates KV (ID is ignored)
# Production: Run ./scripts/setup-cf-infra.sh to create namespace and update this ID
[[kv_namespaces]]
binding = "LICENSE_CODES"
id = "64418f5cb33e4c629fe0ccf51be76399"

# Analytics Engine for device count tracking (fair use monitoring)
[[analytics_engine_datasets]]
binding = "DEVICE_COUNTS"
dataset = "cmdr_device_counts"

# D1 database for telemetry persistence (crash reports, downloads, update checks)
[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "cmdr-telemetry"
database_id = "537fdb4a-cd66-4faf-a2fe-3e51b5f6f915"

[triggers]
crons = ["0 */12 * * *"]

[vars]
# Non-secret config
PRODUCT_NAME = "Cmdr"
SUPPORT_EMAIL = "veszelovszki@gmail.com"
# "sandbox" or "live" — controls which Paddle API + key to use for /validate and webhooks.
# Override with `wrangler secret put PADDLE_ENVIRONMENT` → "live" when going live.
PADDLE_ENVIRONMENT = "sandbox"

# Secrets (set via `wrangler secret put <NAME>`):
# - PADDLE_WEBHOOK_SECRET_LIVE     (from Paddle live dashboard)
# - PADDLE_WEBHOOK_SECRET_SANDBOX  (from Paddle sandbox dashboard)
# - PADDLE_API_KEY_LIVE            (from Paddle live dashboard - for /validate)
# - PADDLE_API_KEY_SANDBOX         (from Paddle sandbox dashboard - for /validate)
# - ED25519_PRIVATE_KEY            (from generate-keys script)
# - RESEND_API_KEY                 (from resend.com)
# - PRICE_ID_COMMERCIAL_SUBSCRIPTION (Price ID for $59/yr subscription)
# - PRICE_ID_COMMERCIAL_PERPETUAL  (Price ID for $199 perpetual)
# - ADMIN_API_TOKEN                (dedicated token for /admin/stats)
# - CRASH_NOTIFICATION_EMAIL      (recipient for crash alert emails)
