name = "cmdr-license-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# api.getcmdr.com is a proxied CNAME → *.workers.dev (handles IPv4 + IPv6).
# The zone-level route tells Cloudflare to send matching requests to this Worker.
# license.getcmdr.com is kept as a permanent alias: existing app versions hardcode it.
workers_dev = true

[[routes]]
pattern = "api.getcmdr.com/*"
zone_name = "getcmdr.com"

[[routes]]
pattern = "license.getcmdr.com/*"
zone_name = "getcmdr.com"

# KV namespace for storing license code -> full key mappings
# Local dev: wrangler automatically simulates KV (ID is ignored)
# Production: Run ./scripts/setup-cf-infra.sh to create namespace and update this ID
[[kv_namespaces]]
binding = "LICENSE_CODES"
id = "64418f5cb33e4c629fe0ccf51be76399"

# KV namespace for blog post likes (separate from license data)
[[kv_namespaces]]
binding = "BLOG_LIKES"
id = "4ff902a7cb084fca97e02c7758ba913e"

# Analytics Engine for device count tracking (fair use monitoring)
[[analytics_engine_datasets]]
binding = "DEVICE_COUNTS"
dataset = "cmdr_device_counts"

# D1 database for telemetry persistence (crash reports, downloads, update checks)
[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "cmdr-telemetry"
database_id = "537fdb4a-cd66-4faf-a2fe-3e51b5f6f915"

# R2 bucket for error report bundles (zips of redacted logs + manifest)
# Provision with ./scripts/setup-cf-infra.sh (that also applies the 90-day lifecycle rule).
[[r2_buckets]]
binding = "ERROR_REPORTS_BUCKET"
bucket_name = "cmdr-error-reports"

# KV namespace for error report bookkeeping (total_bytes counter, eviction lock)
[[kv_namespaces]]
binding = "ERROR_REPORT_META"
id = "e8b67ae9fbd640adaf78aa42d59b80e9"

# Rate limit for POST /heartbeat, keyed by the caller IP (transient, never stored).
# Legit traffic is ~1 beat/hour/install, so 12/min/IP stops a bloat-spam loop without
# touching real users. `period` must be 10 or 60. `namespace_id` is a per-account integer id.
[[ratelimits]]
name = "HEARTBEAT_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 12
period = 60

# Rate limit for POST /beta-signup, keyed by the caller IP (transient, never stored). Signups are
# rare, so this is tighter than the heartbeat: 5/min/IP blocks a signup/confirmation-mail spam loop
# without touching real users. `period` must be 10 or 60. `namespace_id` is a per-account integer id.
[[ratelimits]]
name = "BETA_SIGNUP_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 5
period = 60

[triggers]
crons = ["0 */12 * * *"]

[vars]
# Non-secret config
PRODUCT_NAME = "Cmdr"
SUPPORT_EMAIL = "veszelovszki@gmail.com"
# "sandbox" or "live": controls which Paddle API + key to use for /validate and webhooks.
# Override with `wrangler secret put PADDLE_ENVIRONMENT` → "live" when going live.
PADDLE_ENVIRONMENT = "sandbox"

# Listmonk beta-tester signup (POST /beta-signup). Non-secret config; only the API token is a
# secret (set via `wrangler secret put LISTMONK_API_TOKEN`). The list id MUST be a TOML integer:
# the route requires `typeof listId === 'number'`, so a string secret would disable signups.
LISTMONK_API_URL = "https://mail.getcmdr.com"
LISTMONK_API_USER = "agent"
LISTMONK_BETA_LIST_ID = 4

# Secrets (set via `wrangler secret put <NAME>`):
# - PADDLE_WEBHOOK_SECRET_LIVE     (from Paddle live dashboard)
# - PADDLE_WEBHOOK_SECRET_SANDBOX  (from Paddle sandbox dashboard)
# - PADDLE_API_KEY_LIVE            (from Paddle live dashboard - for /validate)
# - PADDLE_API_KEY_SANDBOX         (from Paddle sandbox dashboard - for /validate)
# - ED25519_PRIVATE_KEY            (from generate-keys script)
# - RESEND_API_KEY                 (from resend.com)
# - PRICE_ID_COMMERCIAL_SUBSCRIPTION (Price ID for $59/yr subscription)
# - PRICE_ID_COMMERCIAL_PERPETUAL  (Price ID for $199 perpetual)
# - ADMIN_API_TOKEN                (dedicated token for /admin/stats)
# - CRASH_NOTIFICATION_EMAIL      (recipient for crash alert emails)
# - DISCORD_WEBHOOK_URL            (Discord webhook for #error-reports)
# - R2_ACCOUNT_ID                  (for minting presigned R2 GET URLs)
# - R2_ACCESS_KEY_ID               (R2 S3-compatible access key; read-only suffices)
# - R2_SECRET_ACCESS_KEY           (paired secret for R2_ACCESS_KEY_ID)
# - LISTMONK_API_TOKEN             (paired API token; sent as `token <user>:<token>`)
#   (LISTMONK_API_URL / LISTMONK_API_USER / LISTMONK_BETA_LIST_ID are non-secret [vars] above.)
#   For local dev, mirror these in .dev.vars (gitignored), for example:
#     LISTMONK_API_URL="https://mail.getcmdr.com"
#     LISTMONK_API_USER="agent"
#     LISTMONK_API_TOKEN="<token>"
#     LISTMONK_BETA_LIST_ID="7"
