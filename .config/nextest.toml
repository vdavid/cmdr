# cargo-nextest configuration
# See https://nexte.st/docs/configuration/ for full documentation
#
# Default test timeout policy
# ---------------------------
# Every Rust test must complete in ≤ 8 s, matching the Playwright E2E suite's
# default. Anything slower is a bug: a real-time-dependent test, an unguarded
# network/IPC call, or an environment race. The cap is intentionally tight so a
# hung test fails the suite in seconds instead of blocking CI for the legacy
# 120 s nextest default. Background:
#
#   2026-05-19/20: `accent_color_linux::tests::read_accent_color_returns_valid_hex`
#   hit nextest's prior 120 s cap because `zbus::blocking::Connection::session()`
#   had no timeout and the GitHub Actions runner had a half-configured D-Bus
#   (orphan socket, no daemon). Cost: 4 days of red main CI before anyone
#   noticed. Fix combined a 500 ms probe timeout in the production code with
#   this tightened nextest cap so the suite shouts immediately next time.
#
# Exceptions
# ----------
# To grant a higher cap, add a `[[profile.default.overrides]]` block matching
# the specific test(s) by name and explain WHY in a comment alongside it. The
# bar is high: the test must exercise something that can't be made faster
# without losing coverage (a real network call, a build artifact materialisation,
# etc.). "It just takes that long" is not a reason — refactor the test instead.

[test-groups]
# NOTE: there is deliberately no `virtual-mtp` group. Virtual-MTP tests used to
# need one because `setup_virtual_mtp_device()` wiped a single shared backing-dir
# root, so concurrent tests deleted each other's fixtures. Each call now gets its
# own temp root, and nextest forks a process per test, so nothing is shared —
# they run fully parallel. (Under plain `cargo test`, where one process runs them
# all, they still share the virtual device's serial; `virtual_device_test_lock()`
# in `mtp::virtual_device` serializes that.) Don't reintroduce a group here to
# fix a virtual-MTP flake: find the shared resource instead.
# Tests that block on REAL OS file-watcher delivery (FSEvents). Running several
# at once multiplies live watches and event storms, and under a saturated suite
# (which grew with the archive milestones' real zip I/O) delivery starvation
# beats a single delivery attempt. Serializing them removes the
# self-interference; the 20 s cap (plus, for the tests that still block on one
# delivery, retries) covers load from the rest of the suite. See the two
# overrides below for which tests self-heal in-test and which lean on retries.
real-notify = { max-threads = 1 }
# Synthetic FAT32/exFAT disk-image fixtures (`indexing::external_drive_fixture`,
# macOS-only, `#[ignore]`d — run via `--run-ignored`). Each attaches a real disk
# image via hdiutil (FSKit `msdos`) and the live-FSEvents probes block on real
# event delivery. Serialize them: concurrent attach/detach churn on the same
# FSKit service is exactly the surface the FAT-unmount panic incident warns
# about, and multiplying live watches starves delivery. See the override below
# for the timeout headroom.
disk-image = { max-threads = 1 }
# SMB streaming STRESS tests hammer the SHARED Docker Samba stack with heavy
# concurrent I/O (hundreds of MB). Running them at once — or alongside each other
# — self-contends on the one server. Serialize them.
smb-stress = { max-threads = 1 }

[[profile.default.overrides]]
# Disk-image fixtures: hdiutil create+attach+detach plus, for the FSEvents
# probes, a 15 s internal wait for real live delivery — all past the global 8 s
# cap. 30 s matches the fixture's own `HDIUTIL_TIMEOUT` SIGKILL guard, so a
# genuinely wedged FSKit service is caught by the fixture first and the cap
# stays a backstop. Serialized via the `disk-image` group above.
filter = 'test(indexing::external_drive_fixture::)'
test-group = 'disk-image'
slow-timeout = { period = "30s", terminate-after = 1 }

# SMB stress tests serialize on the shared server (see `smb-stress` group above).
# The concurrent-streaming one additionally wraps its copy in a 120 s internal
# `tokio::time::timeout` whose expiry dumps the last 30 `client-mutex:`/`recv:`
# lines — its deadlock diagnostic. The general 30 s `smb_integration_` cap below
# would SIGKILL the process before that fires, AND under heavy host/container
# contention (parallel integration runs sharing the one Docker Samba stack) a
# HEALTHY run can legitimately exceed 30 s. Give it 130 s so its own 120 s
# deadline stays authoritative (the diagnostic fires, nextest stays a backstop).
# This override precedes the general one so it wins slow-timeout for this test
# (nextest: the first matching override per setting wins).
[[profile.default.overrides]]
filter = 'test(smb_integration_concurrent_streaming_writes_no_deadlock)'
test-group = 'smb-stress'
slow-timeout = { period = "130s", terminate-after = 1 }

[[profile.default.overrides]]
# Serialize the other heavy SMB stress test against the concurrent-streaming one
# (shared server); its own runtime fits the general 30 s cap, so no override there.
filter = 'test(smb_integration_copy_100_unique_files_no_cross_contamination)'
test-group = 'smb-stress'

[[profile.default.overrides]]
# The two disconnect-storm stress tests run ~20 rounds × 2 volumes of FULL index-DB
# lifecycles (SQLite open, freshness churn, writer drain, delete) in one test. Idle
# macOS runtime is ~0.15 s, but on the Docker Linux lane during a saturated
# full-suite run (both e2e lanes + a workspace build on the host, measured
# 2026-07-24 at host load ~150) the ~40 real DB open/drain/delete cycles starved
# past the global 8 s cap. 20 s keeps the wedge-detection teeth (a genuinely
# wedged registry/writer still fails, in 20 s instead of 8) without flaking on
# container I/O starvation.
filter = 'test(indexing::lifecycle::state::tests::disconnect_storm_two_volumes_never_wedges_the_registry) + test(indexing::tests::stress_tests_lifecycle::disconnect_storm_writer_drain_holds_across_volumes)'
slow-timeout = { period = "20s", terminate-after = 1 }

[[profile.default.overrides]]
# The two kick tests that wait on a REAL spawned enrichment pass (tauri runtime →
# blocking pool → SQLite → media writer thread → poll). Their in-test
# `PASS_LANDS_WITHIN` wait is 20 s (see `kick_tests.rs` for the measured
# saturation diagnosis: at host load ~150 a 5 s budget expired while the pass
# was healthy), and `kick_runs_…` prefixes it with a 1 s negative window — both
# past the global 8 s cap. 30 s keeps the in-test deadline authoritative (its
# panic names the exact wait that starved) with the cap as a hang backstop.
# Keep this above `PASS_LANDS_WITHIN`.
filter = 'test(kick_tests::wire_volume_kicks_an_initial_pass_for_a_fresh_at_launch_volume) + test(kick_tests::kick_runs_a_pass_for_a_ready_volume_only_when_enabled)'
slow-timeout = { period = "30s", terminate-after = 1 }

[[profile.default.overrides]]
# The volume-id NetFS test's internal deadlines are 16 s (kernel-mount connect, the
# sanctioned exception documented at the call site) + 20 s (NetFS settle wait), so the
# general 30 s `smb_integration_` cap below could SIGKILL it before its own waits
# report WHICH stage starved. 40 s keeps the in-test deadlines authoritative (their
# panics name the stage) with the cap as a hang backstop. Precedes the general
# override so it wins slow-timeout for this test (first matching override per
# setting wins).
filter = 'test(smb_integration_volume_id_is_per_mount_not_per_path_shape)'
slow-timeout = { period = "40s", terminate-after = 1 }

[[profile.default.overrides]]
# SMB integration tests (`#[ignore]`-gated, only run by the
# `desktop-rust-integration-tests` check, which boots a real Docker Samba stack).
# Each test pays the SMB session setup + auth + network round-trip cost; the
# happy paths land in 1–3 s, but pathological-case tests (timeouts, slow
# servers, big-listing pagination) intentionally probe slow behavior and need
# headroom. 30 s is generous enough for those without losing the "hung forever"
# safety net.
filter = 'test(smb_integration_)'
slow-timeout = { period = "30s", terminate-after = 1 }

# Real OS file-watcher delivery is inherently laggy AND lossy under load on
# macOS: FSEvents is documented as "~100 ms idle, seconds under load" (see
# `file_viewer/CLAUDE.md`). Under a saturated full-suite run (every core busy)
# two things go wrong that never happen in isolation: the mutation right after a
# just-registered watch is dropped outright (arming isn't finished), and even on
# a live watch a lone create/rename can be coalesced away. Both are unrecoverable
# by waiting — the event is gone. The tests below all block on real delivery and
# use a 15 s internal wait (recv fails cleanly BELOW the 20 s cap so a merely-slow
# event still arrives; the cap stays a hang-catcher). They split into two classes.

[[profile.default.overrides]]
# SELF-HEALING real-FSEvents tests — no retries. Each keeps producing the
# observable mutation until the watch delivers, so neither the just-registered
# arming window nor a lone coalesced/dropped event can starve it, all inside one
# 15 s budget (no second budget stacks). A real regression — the watcher stops
# emitting — therefore surfaces immediately here instead of being masked by a
# retry. Mechanisms:
#   - `downloads/watcher.rs` tests: `observe_mutation` redoes the real
#     create/rename on a fresh name until a matching emit; `prime_watch` proves
#     the watch live before the ring-order mutation;
#     `note_pending_write_suppresses_matching_event` redoes a
#     registered-write + unregistered-control pair until the control emits, then
#     asserts the registered sibling stayed silent (proves suppression against a
#     provably-live watch, no vacuous pass); `scan_latest_fallback_...` is
#     delivery-independent but opens a live watch, so it's grouped to not add to
#     the others' starvation.
#   - `viewer_tail_integration`: the appender writes continuously until the test
#     sees a `Grew`.
#   - `archive::watch_integration_test` live-watch + temp-rename tests:
#     `drive_refresh_until` redoes the zip rewrite (in place, or via temp+rename)
#     until the watch-driven refresh lands the new entry in the listing.
# They still need this override: the redo/continuous loops can run ~11 s under
# saturation, past the global 8 s cap, and `real-notify` serialization keeps
# their live watches from multiplying each other's starvation. NOTE this group
# only serializes under `cargo nextest` (process-per-test); under plain
# `cargo test` the whole module shares one process, where a `WATCH_SERIAL` mutex
# in `downloads::watcher::tests` does the equivalent. Proof: 10/10 saturated
# full-suite `cargo nextest run` loops green at `retries = 0`, and 10/10
# `cargo test --lib downloads::watcher` loops green (verified 2026-07 on a
# 16-core M-series; baseline before the in-test fix was ~2/3 runs failing).
filter = 'test(downloads::watcher::tests::dropping_a_file_emits_one_event) + test(downloads::watcher::tests::partial_rename_to_final_emits_for_final_path) + test(downloads::watcher::tests::latest_download_returns_ring_value_after_event) + test(downloads::watcher::tests::note_pending_write_suppresses_matching_event) + test(downloads::watcher::tests::scan_latest_fallback_finds_file_with_no_events) + test(tail_watcher_sees_appender_task_events_within_debounce) + test(archive::watch::watch_integration_test::a_live_watch_refreshes_the_listing_when_the_zip_changes_on_disk) + test(archive::watch::watch_integration_test::a_temp_rename_swap_refreshes_the_listing)'
test-group = 'real-notify'
slow-timeout = { period = "20s", terminate-after = 1 }

[[profile.default.overrides]]
# File-viewer session watchers — same real-FSEvents class, but these still block
# on a SINGLE delivery (subscribe/start a watch, then rewrite/append/rename once
# and wait). They haven't been restructured to redo the mutation, so a starved or
# coalesced event is unrecoverable within the run. Grant retries: each retry
# re-runs the one test in a fresh process with a fresh watch, which reliably
# catches the event. Coverage isn't lost — the assertions are unchanged, only
# real-OS event timing is tolerated. If these ever get the `observe_mutation` /
# `drive_refresh_until` redo treatment (see the self-healing override above),
# drop the retries. (The archive live-watch tests already made that move.)
filter = 'test(file_viewer::watcher_test::)'
test-group = 'real-notify'
slow-timeout = { period = "20s", terminate-after = 1 }
retries = 2

[profile.default]
# Show test output for failing tests only
failure-output = "immediate"
# Show test output for successful tests
success-output = "never"
# Number of retries for failing tests (useful for flaky tests)
retries = 0
# Run tests with all available threads
test-threads = "num-cpus"
# Fail fast - stop on first failure
fail-fast = false
# Hard cap on every test (see policy at top of file). period × terminate-after
# = 8 s × 1 = kill after 8 s of wall-clock.
slow-timeout = { period = "8s", terminate-after = 1 }

[profile.ci]
# Inherit from default profile
inherits = "default"
# In CI, show output for both passing and failing tests
success-output = "immediate-final"
# In CI, fail fast to save time
fail-fast = true
# JUnit report for CI integration
[profile.ci.junit]
path = "target/nextest/ci/junit.xml"

[profile.default.junit]
path = "target/nextest/default/junit.xml"
