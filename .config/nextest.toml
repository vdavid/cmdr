# cargo-nextest configuration
# See https://nexte.st/docs/configuration/ for full documentation
#
# Default test timeout policy
# ---------------------------
# Every Rust test must complete in ≤ 8 s, matching the Playwright E2E suite's
# default. Anything slower is a bug: a real-time-dependent test, an unguarded
# network/IPC call, or an environment race. The cap is intentionally tight so a
# hung test fails the suite in seconds instead of blocking CI for the legacy
# 120 s nextest default. Background:
#
#   2026-05-19/20: `accent_color_linux::tests::read_accent_color_returns_valid_hex`
#   hit nextest's prior 120 s cap because `zbus::blocking::Connection::session()`
#   had no timeout and the GitHub Actions runner had a half-configured D-Bus
#   (orphan socket, no daemon). Cost: 4 days of red main CI before anyone
#   noticed. Fix combined a 500 ms probe timeout in the production code with
#   this tightened nextest cap so the suite shouts immediately next time.
#
# Exceptions
# ----------
# To grant a higher cap, add a `[[profile.default.overrides]]` block matching
# the specific test(s) by name and explain WHY in a comment alongside it. The
# bar is high: the test must exercise something that can't be made faster
# without losing coverage (a real network call, a build artifact materialisation,
# etc.). "It just takes that long" is not a reason — refactor the test instead.

[test-groups]
# Tests in the `virtual-mtp` group share a single backing-dir fixture root at
# `/tmp/cmdr-mtp-e2e-fixtures` (see `mtp::virtual_device::setup_virtual_mtp_device`),
# so running them concurrently races on a shared filesystem resource and one
# wins with `DirectoryNotEmpty`. Cap concurrency at 1 to serialize them across
# nextest's per-process forks.
virtual-mtp = { max-threads = 1 }
# Tests that block on REAL OS file-watcher delivery (FSEvents). Running several
# at once multiplies live watches and event storms, and under a saturated suite
# (which grew with the archive milestones' real zip I/O) delivery starvation
# beats a single delivery attempt. Serializing them removes the
# self-interference; the 20 s cap (plus, for the tests that still block on one
# delivery, retries) covers load from the rest of the suite. See the two
# overrides below for which tests self-heal in-test and which lean on retries.
real-notify = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'test(mtp_scan) + test(listing_is_watched_flips_with_connection)'
test-group = 'virtual-mtp'

[[profile.default.overrides]]
# SMB integration tests (`#[ignore]`-gated, only run by the
# `desktop-rust-integration-tests` check, which boots a real Docker Samba stack).
# Each test pays the SMB session setup + auth + network round-trip cost; the
# happy paths land in 1–3 s, but pathological-case tests (timeouts, slow
# servers, big-listing pagination) intentionally probe slow behavior and need
# headroom. 30 s is generous enough for those without losing the "hung forever"
# safety net.
filter = 'test(smb_integration_)'
slow-timeout = { period = "30s", terminate-after = 1 }

# Real OS file-watcher delivery is inherently laggy AND lossy under load on
# macOS: FSEvents is documented as "~100 ms idle, seconds under load" (see
# `file_viewer/CLAUDE.md`). Under a saturated full-suite run (every core busy)
# two things go wrong that never happen in isolation: the mutation right after a
# just-registered watch is dropped outright (arming isn't finished), and even on
# a live watch a lone create/rename can be coalesced away. Both are unrecoverable
# by waiting — the event is gone. The tests below all block on real delivery and
# use a 15 s internal wait (recv fails cleanly BELOW the 20 s cap so a merely-slow
# event still arrives; the cap stays a hang-catcher). They split into two classes.

[[profile.default.overrides]]
# SELF-HEALING real-FSEvents tests — no retries. Each keeps producing the
# observable mutation until the watch delivers, so neither the just-registered
# arming window nor a lone coalesced/dropped event can starve it, all inside one
# 15 s budget (no second budget stacks). A real regression — the watcher stops
# emitting — therefore surfaces immediately here instead of being masked by a
# retry. Mechanisms:
#   - `downloads/watcher.rs` tests: `observe_mutation` redoes the real
#     create/rename on a fresh name until a matching emit; `prime_watch` proves
#     the watch live before the ring-order mutation.
#   - `viewer_tail_integration`: the appender writes continuously until the test
#     sees a `Grew`.
# They still need this override: the redo/continuous loops can run ~11 s under
# saturation, past the global 8 s cap, and `real-notify` serialization keeps
# their live watches from multiplying each other's starvation. Proof: 10/10
# saturated full-suite runs of the downloads trio green at `retries = 0`
# (verified 2026-07 on a 16-core M-series, full `cargo nextest run` looped;
# baseline before the in-test fix was ~2/3 runs failing).
filter = 'test(downloads::watcher::tests::dropping_a_file_emits_one_event) + test(downloads::watcher::tests::partial_rename_to_final_emits_for_final_path) + test(downloads::watcher::tests::latest_download_returns_ring_value_after_event) + test(tail_watcher_sees_appender_task_events_within_debounce)'
test-group = 'real-notify'
slow-timeout = { period = "20s", terminate-after = 1 }

[[profile.default.overrides]]
# Archive live-content and file-viewer tail watchers — same real-FSEvents class,
# but these still block on a SINGLE delivery (subscribe/start a watch, then
# rewrite/append/rename once and wait). They haven't been restructured to redo
# the mutation, so a starved or coalesced event is unrecoverable within the run.
# Grant retries: each retry re-runs the one test in a fresh process with a fresh
# watch, which reliably catches the event. Coverage isn't lost — the assertions
# are unchanged, only real-OS event timing is tolerated. If these ever get the
# `observe_mutation` redo treatment (see the downloads override above), drop the
# retries.
filter = 'test(file_viewer::watcher_test::) + test(archive::watch_integration_test::a_live_watch_refreshes_the_listing_when_the_zip_changes_on_disk) + test(archive::watch_integration_test::a_temp_rename_swap_refreshes_the_listing)'
test-group = 'real-notify'
slow-timeout = { period = "20s", terminate-after = 1 }
retries = 2

[profile.default]
# Show test output for failing tests only
failure-output = "immediate"
# Show test output for successful tests
success-output = "never"
# Number of retries for failing tests (useful for flaky tests)
retries = 0
# Run tests with all available threads
test-threads = "num-cpus"
# Fail fast - stop on first failure
fail-fast = false
# Hard cap on every test (see policy at top of file). period × terminate-after
# = 8 s × 1 = kill after 8 s of wall-clock.
slow-timeout = { period = "8s", terminate-after = 1 }

[profile.ci]
# Inherit from default profile
inherits = "default"
# In CI, show output for both passing and failing tests
success-output = "immediate-final"
# In CI, fail fast to save time
fail-fast = true
# JUnit report for CI integration
[profile.ci.junit]
path = "target/nextest/ci/junit.xml"

[profile.default.junit]
path = "target/nextest/default/junit.xml"
