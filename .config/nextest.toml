# cargo-nextest configuration
# See https://nexte.st/docs/configuration/ for full documentation
#
# Default test timeout policy
# ---------------------------
# Every Rust test must complete in ≤ 8 s, matching the Playwright E2E suite's
# default. Anything slower is a bug: a real-time-dependent test, an unguarded
# network/IPC call, or an environment race. The cap is intentionally tight so a
# hung test fails the suite in seconds instead of blocking CI for the legacy
# 120 s nextest default. Background:
#
#   2026-05-19/20: `accent_color_linux::tests::read_accent_color_returns_valid_hex`
#   hit nextest's prior 120 s cap because `zbus::blocking::Connection::session()`
#   had no timeout and the GitHub Actions runner had a half-configured D-Bus
#   (orphan socket, no daemon). Cost: 4 days of red main CI before anyone
#   noticed. Fix combined a 500 ms probe timeout in the production code with
#   this tightened nextest cap so the suite shouts immediately next time.
#
# Exceptions
# ----------
# To grant a higher cap, add a `[[profile.default.overrides]]` block matching
# the specific test(s) by name and explain WHY in a comment alongside it. The
# bar is high: the test must exercise something that can't be made faster
# without losing coverage (a real network call, a build artifact materialisation,
# etc.). "It just takes that long" is not a reason — refactor the test instead.

[test-groups]
# Tests in the `virtual-mtp` group share a single backing-dir fixture root at
# `/tmp/cmdr-mtp-e2e-fixtures` (see `mtp::virtual_device::setup_virtual_mtp_device`),
# so running them concurrently races on a shared filesystem resource and one
# wins with `DirectoryNotEmpty`. Cap concurrency at 1 to serialize them across
# nextest's per-process forks.
virtual-mtp = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'test(mtp_scan) + test(listing_is_watched_flips_with_connection)'
test-group = 'virtual-mtp'

[[profile.default.overrides]]
# SMB integration tests (`#[ignore]`-gated, only run by the
# `desktop-rust-integration-tests` check, which boots a real Docker Samba stack).
# Each test pays the SMB session setup + auth + network round-trip cost; the
# happy paths land in 1–3 s, but pathological-case tests (timeouts, slow
# servers, big-listing pagination) intentionally probe slow behavior and need
# headroom. 30 s is generous enough for those without losing the "hung forever"
# safety net.
filter = 'test(smb_integration_)'
slow-timeout = { period = "30s", terminate-after = 1 }

[[profile.default.overrides]]
# Real OS file-watcher delivery is inherently laggy AND lossy under load on
# macOS: FSEvents is documented as "~100 ms idle, seconds under load" (see
# `file_viewer/CLAUDE.md`). These tests subscribe to a live watcher (`file_viewer`
# viewer watcher, and the `downloads` `notify` integration tests) and block on
# real event delivery, so under a saturated full-suite run two things go wrong
# that never happen in isolation or on a lighter suite:
#   1. Delivery lags past the tight global 8 s cap — which also equals each test's
#      own internal event-wait, leaving no slack (this timed out
#      `partial_rename_to_final_emits_for_final_path` at 8 s and pushed
#      `watcher_observes_inode_replace` to ~5.3 s). Fixed by raising the tests'
#      internal waits to 15 s (recv fails cleanly BELOW this 20 s cap) so a merely
#      slow event still arrives; the 20 s cap stays a hang-catcher.
#   2. The event is occasionally lost/starved entirely (FSEvents delivery to a
#      just-registered watch can miss the mutation when the CPU is saturated by
#      num-cpus test threads) — `partial_rename_to_final_emits_for_final_path`
#      then waits the full 15 s and gets nothing. A raised timeout can't help a
#      lost event, so grant retries: each retry re-runs the single test in a fresh
#      process with a fresh watch, which reliably catches the event. This is the
#      one class the global `retries = 0` intentionally exempts ("useful for flaky
#      tests"). Coverage isn't lost: the assertions are unchanged, only real-OS
#      event timing is tolerated for these specific real-delivery tests.
#   The archive live-content watch tests (`a_live_watch_refreshes_…`,
#   `a_temp_rename_swap_…`) are the same class: they start a real `notify` watch
#   on a temp dir and block on FSEvents delivery after rewriting the backing
#   `.zip`. Their internal poll waits up to 15 s; without this override the global
#   8 s cap would SIGTERM them under a saturated run, and they want the same retry
#   tolerance for a starved event.
filter = 'test(file_viewer::watcher_test::) + test(downloads::watcher::tests::dropping_a_file_emits_one_event) + test(downloads::watcher::tests::partial_rename_to_final_emits_for_final_path) + test(downloads::watcher::tests::latest_download_returns_ring_value_after_event) + test(archive::watch_integration_test::a_live_watch_refreshes_the_listing_when_the_zip_changes_on_disk) + test(archive::watch_integration_test::a_temp_rename_swap_refreshes_the_listing)'
slow-timeout = { period = "20s", terminate-after = 1 }
retries = 2

[profile.default]
# Show test output for failing tests only
failure-output = "immediate"
# Show test output for successful tests
success-output = "never"
# Number of retries for failing tests (useful for flaky tests)
retries = 0
# Run tests with all available threads
test-threads = "num-cpus"
# Fail fast - stop on first failure
fail-fast = false
# Hard cap on every test (see policy at top of file). period × terminate-after
# = 8 s × 1 = kill after 8 s of wall-clock.
slow-timeout = { period = "8s", terminate-after = 1 }

[profile.ci]
# Inherit from default profile
inherits = "default"
# In CI, show output for both passing and failing tests
success-output = "immediate-final"
# In CI, fail fast to save time
fail-fast = true
# JUnit report for CI integration
[profile.ci.junit]
path = "target/nextest/ci/junit.xml"

[profile.default.junit]
path = "target/nextest/default/junit.xml"
