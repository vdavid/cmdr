packages:
  - apps/*

# Don't prompt before wiping node_modules when pnpm decides it's stale;
# our checker runs pnpm non-interactively and there's no human to answer.
confirmModulesPurge: false

# ‚îÄ‚îÄ Supply-chain defences (pnpm 11+) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Project-side belt-and-suspenders so anyone cloning Cmdr gets the same
# install-side guarantees even without the matching keys in their `~/.npmrc`.
# Read alongside `.claude/rules/use-latest-dep-versions.md` ‚Äî Renovate already
# enforces a 3-day cooldown at PR-open time; this is the install-side
# guardrail for anything that bypasses Renovate (manual `pnpm add`, a fresh
# clone, a contributor without our Renovate config).

# Block installs of versions published less than 3 days ago. pnpm 11 ships
# with a 1440 min (1 day) default; we tighten it. Value is minutes (4320 = 3
# days). Use `minimumReleaseAgeExclude` to bypass per-package for hot-fix CVE
# patches.
minimumReleaseAge: 4320

# Refuse to install a package whose trust level has dropped since the last
# successful resolve (publisher loses verified status, package transferred to
# an unknown owner). Default is `off`. The win is mitigation against the
# publisher-takeover class.
#
# pnpm 11 re-verifies the WHOLE lockfile against this policy on every install
# (so `pnpm check` and CI hit it too, not just `pnpm add`). A `--trust-policy-exclude`
# CLI flag is scoped to one command and never persists, so it can't keep `pnpm
# check` green for a flagged transitive dep ‚Äî the exclusion has to live here.
# `trustPolicyExclude` (below) is therefore the home for vetted, version-pinned
# approvals; we keep them explicit per version rather than blanket-trusting old
# publish dates via `trustPolicyIgnoreAfter`, so a genuine takeover of an
# untouched version still trips.
#
# To approve a new downgrade: vet it on npmjs.com (same maintainer + repo, the
# flagged version merely lacks a provenance attestation from npm's uneven
# rollout rather than showing a real ownership transfer), then add the exact
# `name@version` to `trustPolicyExclude`.
trustPolicy: no-downgrade

# Vetted trust downgrades: mainstream deps whose old versions predate npm's
# provenance rollout (canonical maintainer + repo confirmed), not takeovers.
# Pinned to exact versions so a future republish of the same string re-trips.
#   chokidar@4.0.3  ‚Üí paulmillr/chokidar (via svelte-check)
#   semver@5.7.2, semver@6.3.1 ‚Üí npm/node-semver (old major lines, transitive)
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@5.7.2
  - semver@6.3.1

# Explicit even though pnpm 11 defaults to true: only direct dependencies may
# use exotic sources (git repos, tarball URLs). A compromised tree can't pull
# anything unaudited via a nested git+https://‚Ä¶
blockExoticSubdeps: true

# Pin transitive deps to fix CVEs in older indirect ranges.
overrides:
  serialize-javascript: '>=7.0.3'
  lodash: '>=4.17.23'
  # Floor: cookie <0.7.0 accepts out-of-bounds characters in name/value
  # (GHSA-pxg6-pf52-xh8x). Ceiling: cookie 2.0 renamed the whole API
  # (`parse`/`serialize` became `parseCookie`/`stringifyCookie`/`parseSetCookie`/
  # `stringifySetCookie`), and `@sveltejs/kit` still does
  # `import { parse, serialize } from 'cookie'`, so 2.x breaks the SvelteKit
  # build with `[MISSING_EXPORT] "parse" is not exported`. Kit itself asks for
  # `^0.6.0`; only raise the ceiling once Kit's runtime uses the 2.x names.
  cookie: '>=0.7.0 <2'
  tmp: '>=0.2.4'

# pnpm 11 requires explicit per-package build-script approval. The legacy
# `pnpm.onlyBuiltDependencies` field in package.json is ignored.
allowBuilds:
  esbuild: false
  sharp: true
  workerd: true
